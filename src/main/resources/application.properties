spring.application.name=spring-boot-postgresql-crud

# DataSource (Postgres). Defaults assume Postgres on localhost:5432 (Mode A:
# app on host, Postgres in Docker). In Mode B (full stack via compose), the
# `app` service overrides these with SPRING_DATASOURCE_URL etc.
spring.datasource.url=jdbc:postgresql://localhost:5432/productdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
